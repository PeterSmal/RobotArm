<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Arm Control Panel with Object Detection</title>
    <link rel="stylesheet" href="css/styles.css"> 
</head>

<body>
    <header class="headerBar">
        <h1>Robot Arm Control</h1>
    </header>

    <div class="mainContent">
        <div class="control-container">
            <button class="clicks" id="startButton" onclick="sendCommand('start')">Start Robot Arm</button>
            <div class="videoBox">
                <video id="videoFeed" autoplay></video>
            </div>
            <button class="clicks" id="stopButton" onclick="sendCommand('stop')">Stop Robot Arm</button>
        </div>
    </div>

    <script>
        function sendCommand(command) {
            fetch(`/control?cmd=${command}`)
                .then(response => response.json())
                .then(data => console.log(data))
                .catch(error => console.error('Error:', error));
        }

        // Function to start video stream from a webcam (adjust this if needed)
        function startVideo() {
            const video = document.getElementById('videoFeed');
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        video.srcObject = stream;
                    })
                    .catch(err => {
                        console.log("Error accessing camera: ", err);
                    });
            }
        }

        // Start video stream when the page loads
        window.onload = startVideo;
    </script>
</body>
</html>
